seed: 7351

# train data
train:
  batch_size: 1
  num_workers: 8
  point_limit: 30000
  use_augmentation: True
  augmentation_noise: 0.005
  augmentation_rotation: 1.0

# test data
test: 
  batch_size: 1
  num_workers: 8
  point_limit: None

# evaluation
eval:
  acceptance_overlap: 0.0
  acceptance_radius: 0.1
  inlier_ratio_threshold: 0.05
  rmse_threshold: 0.2
  rre_threshold: 15.0
  rte_threshold: 0.3

# ransac
ransac:
  distance_threshold: 0.05
  num_points: 4
  num_iterations: 50000
  num_validations: 1000

# optim
optim:
  lr: 0.0001
  lr_decay: 0.95
  lr_decay_steps: 1
  weight_decay: 0.000001
  max_epoch: 40
  grad_acc_steps: 1

# model - backbone
backbone:
  num_stages: 4
  init_voxel_size: 0.025
  kernel_size: 15
  base_radius: 2.5
  base_sigma: 2.0
  group_norm: 32
  input_dim: 1
  init_dim: 64
  output_dim: 256

# model - Global
model:
  ground_truth_matching_radius: 0.05
  num_points_in_patch: 64
  num_sinkhorn_iterations: 100

# model - Coarse Matching
coarse_matching:
  num_targets: 128
  overlap_threshold: 0.1
  num_correspondences: 256   # 5000 for test and eval
  dual_normalization: True

# model - GeoTransformer
geotransformer:
  input_dim: 1024
  hidden_dim: 256
  output_dim: 256
  num_heads: 4
  blocks: ['self', 'cross', 'self', 'cross', 'self', 'cross']
  sigma_d: 0.2
  sigma_a: 15
  angle_k: 3
  reduction_a: max

# model - Fine Matching
fine_matching:
  topk: 3
  acceptance_radius: 0.1
  mutual: True
  confidence_threshold: 0.05
  use_dustbin: False
  use_global_score: False
  correspondence_threshold: 3
  correspondence_limit: None
  num_refinement_steps: 5
  loftr: True

# loss - Coarse level
coarse_loss:
  positive_margin: 0.1
  negative_margin: 1.4
  positive_optimal: 0.1
  negative_optimal: 1.4
  log_scale: 24
  positive_overlap: 0.1

# loss - Fine level
fine_loss:
  positive_radius: 0.05

# loss - Overall
loss:
  weight_coarse_loss: 1.0
  weight_fine_loss: 1.0
  weight_rec_loss: 0.0 # False